<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Chrome | 金属立体效果生成器</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <aside class="sidebar">
            <header>
                <div class="logo">
                    <i class="fas fa-gem"></i>
                    <h1>MetalGen <span>Pro</span></h1>
                </div>
                <p class="tagline">图形转液态金属/镀铬效果</p>
            </header>

            <div class="controls-wrapper">
                <section class="control-group">
                    <label>导入图形 (PNG/JPG)</label>
                    <div class="upload-box" id="drop-zone">
                        <i class="fas fa-file-import"></i>
                        <span>选择透明背景图片效果更佳</span>
                        <input type="file" id="image-input" accept="image/*" hidden>
                    </div>
                </section>

                <section class="control-group">
                    <label>立体深度 (Depth): <span id="depth-val">10</span></label>
                    <input type="range" id="depth" min="1" max="50" value="10">
                </section>

                <section class="control-group">
                    <label>边缘平滑 (Blur): <span id="blur-val">5</span></label>
                    <input type="range" id="blur" min="0" max="20" value="5">
                </section>

                <section class="control-group">
                    <label>光照强度 (Shine): <span id="shine-val">1.5</span></label>
                    <input type="range" id="shine" min="0" max="5" value="1.5" step="0.1">
                </section>

                <section class="control-group">
                    <label>金属质感 (Specular): <span id="specular-val">30</span></label>
                    <input type="range" id="specular" min="1" max="100" value="30">
                </section>

                <section class="control-group">
                    <label>颗粒质感 (Grain): <span id="grain-val">0.2</span></label>
                    <input type="range" id="grain" min="0" max="1" value="0.2" step="0.05">
                </section>

                <section class="control-group">
                    <label>光照方向: <span id="angle-val">135</span>°</label>
                    <input type="range" id="angle" min="0" max="360" value="135">
                </section>

                <section class="control-group">
                    <label>图形缩放: <span id="scale-val">1.0</span></label>
                    <input type="range" id="scale" min="0.1" max="3" value="1" step="0.1">
                </section>
            </div>

            <footer class="sidebar-footer">
                <button id="download-btn" class="primary-btn">
                    <i class="fas fa-save"></i> 导出金属图形
                </button>
            </footer>
        </aside>

        <main class="viewport">
            <div class="canvas-wrapper" id="canvas-container">
                <canvas id="main-canvas"></canvas>
            </div>
            <div class="interaction-hint">
                <i class="fas fa-arrows-alt"></i> 拖拽调整位置 | 实时渲染中
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
