<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xerox Art | 高对比度复印风格</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header>
                <div class="logo">
                    <i class="fas fa-print"></i>
                    <h1>XeroxArt <span>Pro</span></h1>
                </div>
                <p class="tagline">高对比度边缘提取与复印机质感</p>
            </header>

            <div class="controls-wrapper">
                <section class="control-group">
                    <label>导入图片</label>
                    <div class="upload-box" id="drop-zone">
                        <i class="fas fa-file-image"></i>
                        <span>支持拖拽或点击上传</span>
                        <input type="file" id="image-input" accept="image/*" hidden>
                    </div>
                </section>

                <section class="control-group">
                    <label>边缘提取 (Edge): <span id="edge-val">1.5</span></label>
                    <input type="range" id="edge-strength" min="0" max="5" value="1.5" step="0.1">
                </section>

                <section class="control-group">
                    <label>对比度 (Contrast): <span id="contrast-val">128</span></label>
                    <input type="range" id="contrast" min="0" max="255" value="128">
                </section>

                <section class="control-group">
                    <label>细节平滑 (Smooth): <span id="smooth-val">0</span></label>
                    <input type="range" id="smooth" min="0" max="10" value="0">
                </section>

                <section class="control-group">
                    <label>颗粒质感 (Grain): <span id="grain-val">0.2</span></label>
                    <input type="range" id="grain" min="0" max="1" value="0.2" step="0.05">
                </section>

                <section class="control-group">
                    <label>反色处理 (Invert)</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="invert">
                        <label for="invert"></label>
                    </div>
                </section>

                <section class="control-group">
                    <label>图片缩放: <span id="scale-val">1.0</span></label>
                    <input type="range" id="scale" min="0.1" max="3" value="1" step="0.1">
                </section>
            </div>

            <footer class="sidebar-footer">
                <button id="download-btn" class="primary-btn">
                    <i class="fas fa-save"></i> 导出艺术图片
                </button>
            </footer>
        </aside>

        <main class="viewport">
            <div class="canvas-wrapper" id="canvas-container">
                <canvas id="main-canvas"></canvas>
            </div>
            <div class="interaction-hint">
                <i class="fas fa-arrows-alt"></i> 拖拽调整位置 | 实时生成
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
