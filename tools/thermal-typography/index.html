<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Typography | 热感字体效果生成器</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header>
                <div class="logo">
                    <i class="fas fa-fire-alt"></i>
                    <h1>ThermalGen <span>Pro</span></h1>
                </div>
                <p class="tagline">多层等高线热感文字效果</p>
            </header>

            <div class="controls-wrapper">
                <section class="control-group">
                    <label>管理文本</label>
                    <div class="text-list" id="text-list">
                        <!-- Dynamic text items will be here -->
                    </div>
                    <button id="add-text-btn" class="secondary-btn">
                        <i class="fas fa-plus"></i> 添加新文本
                    </button>
                </section>

                <section class="control-group">
                    <label>自定义字体</label>
                    <div class="font-upload-wrapper">
                        <input type="file" id="font-upload" accept=".ttf,.otf,.woff" hidden>
                        <button onclick="document.getElementById('font-upload').click()" class="secondary-btn">
                            <i class="fas fa-upload"></i> 上传字体文件
                        </button>
                        <select id="font-family-select">
                            <option value='"Inter", "Microsoft YaHei", sans-serif'>默认字体</option>
                        </select>
                    </div>
                </section>

                <section class="control-group">
                    <label>等高线层数: <span id="layer-val">8</span></label>
                    <input type="range" id="layers" min="1" max="15" value="8">
                </section>

                <section class="control-group">
                    <label>扩散范围 (Spread): <span id="spread-val">12</span></label>
                    <input type="range" id="spread" min="2" max="30" value="12">
                </section>

                <section class="control-group">
                    <label>热感色调</label>
                    <select id="color-scheme">
                        <option value="classic">经典热感 (Orange-Cyan)</option>
                        <option value="neon">霓虹辉光 (Pink-Purple)</option>
                        <option value="acid">酸性设计 (Green-Yellow)</option>
                        <option value="monochrome">黑白等高 (B&W)</option>
                    </select>
                </section>

                <section class="control-group">
                    <label>辉光强度: <span id="glow-val">0.5</span></label>
                    <input type="range" id="glow" min="0" max="1" value="0.5" step="0.1">
                </section>
            </div>

            <footer class="sidebar-footer">
                <button id="download-btn" class="primary-btn">
                    <i class="fas fa-download"></i> 导出热感图形
                </button>
            </footer>
        </aside>

        <main class="viewport">
            <div class="canvas-wrapper" id="canvas-container">
                <canvas id="main-canvas"></canvas>
            </div>
            <div class="interaction-hint">
                <i class="fas fa-magic"></i> 自动计算多层路径中
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
