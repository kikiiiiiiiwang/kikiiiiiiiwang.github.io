<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Shapes | 图像抽象图形生成器</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header>
                <div class="logo">
                    <i class="fas fa-draw-polygon"></i>
                    <h1>Abstract <span>Shapes</span></h1>
                </div>
                <p class="tagline">将图片抽象成可用于排版的图形块</p>
            </header>

            <div class="controls-wrapper">
                <section class="control-group">
                    <label>导入图片</label>
                    <div class="upload-box" id="drop-zone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span>拖拽或点击上传图片</span>
                        <input type="file" id="image-input" accept="image/*" hidden>
                    </div>
                </section>

                <section class="control-group">
                    <label>抽象模式</label>
                    <select id="mode">
                        <option value="silhouette">轮廓块 (Silhouette)</option>
                        <option value="posterize">分层块 (Posterize)</option>
                    </select>
                </section>

                <section class="control-group">
                    <label>阈值 (Threshold): <span id="threshold-val">0.52</span></label>
                    <input type="range" id="threshold" min="0" max="1" value="0.52" step="0.01">
                </section>

                <section class="control-group">
                    <label>自动阈值</label>
                    <div class="toggle-row">
                        <input type="checkbox" id="auto-threshold" checked>
                        <span>Otsu 自动分割</span>
                    </div>
                </section>

                <section class="control-group">
                    <label>模糊 (Blur): <span id="blur-val">6</span>px</label>
                    <input type="range" id="blur" min="0" max="20" value="6" step="1">
                </section>

                <section class="control-group">
                    <label>平滑强度 (Smooth): <span id="smooth-val">2</span></label>
                    <input type="range" id="smooth" min="0" max="6" value="2" step="1">
                </section>

                <section class="control-group">
                    <label>分层数量 (Layers): <span id="layers-val">3</span></label>
                    <input type="range" id="layers" min="1" max="6" value="3" step="1">
                </section>

                <section class="control-group">
                    <label>反转</label>
                    <div class="toggle-row">
                        <input type="checkbox" id="invert" checked>
                        <span>黑白反转</span>
                    </div>
                </section>

                <section class="control-group">
                    <label>填充颜色</label>
                    <input type="color" id="fill-color" value="#000000">
                </section>

                <section class="control-group">
                    <label>背景颜色</label>
                    <input type="color" id="bg-color" value="#ffffff">
                </section>

                <section class="control-group">
                    <label>底图保留 (Underlay): <span id="underlay-val">0.25</span></label>
                    <input type="range" id="underlay" min="0" max="1" value="0.25" step="0.05">
                </section>

                <section class="control-group">
                    <label>描边颜色</label>
                    <input type="color" id="outline-color" value="#000000">
                </section>

                <section class="control-group">
                    <label>描边宽度 (Outline): <span id="outline-val">4</span>px</label>
                    <input type="range" id="outline" min="0" max="20" value="4" step="1">
                </section>

                <section class="control-group">
                    <label>输出分辨率 (Resolution): <span id="res-val">420</span></label>
                    <input type="range" id="resolution" min="160" max="900" value="420" step="20">
                </section>
            </div>

            <footer class="sidebar-footer">
                <button id="download-btn" class="primary-btn">
                    <i class="fas fa-download"></i> 导出图形
                </button>
            </footer>
        </aside>

        <main class="viewport">
            <div class="canvas-wrapper">
                <canvas id="main-canvas"></canvas>
            </div>
            <div class="interaction-hint">
                <i class="fas fa-mouse-pointer"></i> 拖拽调整位置 | 滚轮缩放
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
