<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphicLace | 图形蕾丝转换工具</title>
    <link rel="stylesheet" href="../lace-type/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            background: rgba(0,0,0,0.02);
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(0,0,0,0.05);
        }
        .image-preview-mini {
            width: 100%;
            height: 100px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-top: 10px;
            border-radius: 8px;
            background-color: #eee;
            display: none;
        }
    </style>
</head>
<body class="light-theme">
    <div class="tool-wrapper">
        <header class="tool-header">
            <div class="brand">
                <i class="fas fa-vector-square"></i>
                <h1>GraphicLace <span>Pro</span></h1>
            </div>
            <p class="subtitle">图形/照片 实时转蕾丝效果</p>
        </header>

        <main class="tool-content">
            <aside class="control-panel glass">
                <section class="control-group">
                    <label>导入图形 (JPG/PNG/SVG)</label>
                    <div id="drop-zone" class="drop-zone">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #888;"></i>
                        <p style="font-size: 0.8rem; margin-top: 10px;">点击或拖拽文件至此</p>
                        <input type="file" id="file-input" accept="image/*,.svg" style="display: none;">
                        <div id="mini-preview" class="image-preview-mini"></div>
                    </div>
                </section>

                <section class="control-group">
                    <label>提取阈值 (Threshold)</label>
                    <input type="range" id="threshold" min="0" max="255" value="128">
                    <p class="preview-info">调节以保留更多或更少细节</p>
                </section>

                <section class="control-group">
                    <label>蕾丝密度 (单元大小)</label>
                    <input type="range" id="pattern-size" min="3" max="15" value="6">
                </section>

                <section class="control-group">
                    <label>纹理粗细</label>
                    <input type="range" id="line-weight" min="0.5" max="3" value="1" step="0.1">
                </section>

                <section class="control-group">
                    <label>图形缩放</label>
                    <input type="range" id="img-scale" min="0.1" max="2" value="1" step="0.1">
                </section>

                <div class="action-footer">
                    <button id="download-btn" class="primary-btn">
                        <i class="fas fa-file-export"></i> 导出蕾丝图形
                    </button>
                </div>
            </aside>

            <section class="preview-area">
                <div class="canvas-container glass">
                    <canvas id="main-canvas"></canvas>
                </div>
                <div class="preview-info">
                    <p><i class="fas fa-mouse-pointer"></i> 提示：直接在画布上拖拽图形以调整构图</p>
                </div>
            </section>
        </main>
    </div>
    <script src="graphic.js"></script>
</body>
</html>
